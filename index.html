<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C96A3A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DealMatch" />

    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- SEO -->
    <title>DealMatch — Find Your Perfect Property in Nigeria</title>
    <meta name="description" content="Nigeria's first dating-app style real estate platform. Swipe, match, and connect with your perfect property deal. Buy, sell, rent, and book hotels across Nigeria." />
    <meta name="keywords" content="Nigeria real estate, property for sale, houses for rent, Lagos property, Abuja real estate, DealMatch" />
    <meta name="author" content="DealMatch" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dealmatch-yvdm.vercel.app" />
    <meta property="og:title" content="DealMatch — Find Your Perfect Property" />
    <meta property="og:description" content="Swipe, match, and connect with your perfect property deal in Nigeria." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DealMatch — Find Your Perfect Property" />
    <meta name="twitter:description" content="Nigeria's first dating-app style real estate platform." />
    <meta name="twitter:image" content="/icons/icon-512.png" />

    <!-- Splash screens for iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('DealMatch SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err))
        })
      }
    </script>
  </body>
</html>
